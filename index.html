<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>BeamDrop — Turn any VPS or server into a private, self-hosted Google Drive + S3 in seconds.</title>
    <meta name="description" content="BeamDrop is a fast, lightweight, self-hosted file server with an S3-compatible API built in Go. Features include file management, shareable links, presigned URLs, API key authentication, Docker support, and a modern web UI — all in a single ~15 MB binary." />
    <meta name="keywords" content="beamdrop, file server, self-hosted, S3 compatible, file sharing, object storage, Go, Docker, file management, presigned URLs, API, open source" />
    <meta name="author" content="ekilie" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://docs.beamdrop.cloud/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://docs.beamdrop.cloud/" />
    <meta property="og:title" content="BeamDrop — Turn any VPS or server into a private, self-hosted Google Drive + S3 in seconds." />
    <meta property="og:description" content="Fast, lightweight, self-hosted file server with an S3-compatible API. Single binary, Docker-ready, with shareable links, presigned URLs, and a modern web UI." />
    <meta property="og:image" content="https://docs.beamdrop.cloud/beamdrop.jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BeamDrop — Self-Hosted File Server" />
    <meta property="og:site_name" content="BeamDrop" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://docs.beamdrop.cloud/" />
    <meta name="twitter:title" content="BeamDrop — Turn any VPS or server into a private, self-hosted Google Drive + S3 in seconds." />
    <meta name="twitter:description" content="Fast, lightweight, self-hosted file server with an S3-compatible API. Single binary, Docker-ready, with shareable links, presigned URLs, and a modern web UI." />
    <meta name="twitter:image" content="https://docs.beamdrop.cloud/beamdrop.jpeg" />
    <meta name="twitter:image:alt" content="BeamDrop — Self-Hosted File Server" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

        "@type": "Offer",

        "S3-Compatible API",
